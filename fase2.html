<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fase 2 - Planificación</title>
    <link rel="stylesheet" href="style_fases.css">
</head>

<body>

<header>
    <img src="logo_prepa_en_linea.png">
    <h1>Fase 2 - Planificación</h1>
    <img src="generacion_58.png">
</header>

<div class="volver">
    <a href="index.html">⬅ Regresar al inicio</a>
</div>

<main>
    <section>
        <h2>Justificación</h2>
        <p>Para justificar los porqués de mi proyecto se presenta un audio para comprender en que se basa la implemetación de la tiendita de abarrotes.</p>
    </section>


<div class="audio-card">
    <button class="play-button">REPRODÚCEME</button>
    <audio controls>
        <source src="audio-fase2.mp3">
    </audio>
</div>

</main>

<footer>
    <p>&copy; 2026 Jose Luis Adame</p>
</footer>

<script>
const btn = document.querySelector('.play-button');
const audio = document.querySelector('audio');

btn.addEventListener('click', () => {
    if(audio.paused){
        audio.play();
        btn.textContent = "PAUSAR";
    } else {
        audio.pause();
        btn.textContent = "REPRODÚCEME";
    }
});
</script>

</body>
</html>
